<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background: dark navy rounded square -->
  <rect width="200" height="200" rx="28" fill="#0c0c1e"/>

  <!-- Concentric gold rings: the donut decomposition from §4
       (opacity rises inward, suggesting the Gaussian bell peak;
        innermost ring is full-opacity and slightly thicker) -->
  <circle cx="100" cy="100" r="86" fill="none" stroke="#f0c040" stroke-width="1.6" opacity="0.18"/>
  <circle cx="100" cy="100" r="72" fill="none" stroke="#f0c040" stroke-width="1.7" opacity="0.36"/>
  <circle cx="100" cy="100" r="58" fill="none" stroke="#f0c040" stroke-width="1.8" opacity="0.58"/>
  <circle cx="100" cy="100" r="44" fill="none" stroke="#f0c040" stroke-width="2.0" opacity="0.85"/>
  <circle cx="100" cy="100" r="30" fill="none" stroke="#f0c040" stroke-width="2.8"/>

  <!-- τ centerpiece (manual y offset; italic τ's descending curl shifts
       the glyph's visual center ~6 px below its alphabetic baseline) -->
  <text x="99" y="111" font-family="Georgia, 'Times New Roman', serif" font-size="42"
        fill="#f0c040" text-anchor="middle" font-style="italic">τ</text>
</svg>
