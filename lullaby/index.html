  <title>The τ Lullaby — count yourself to sleep · MathTau</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0c1e;
      --surface:   #111128;
      --surface-2: #16163a;
      --border:    #22224a;
      --text:      #c4c4dc;
      --muted:     #8888a8;
      --gold:      #f4c830;
      --cyan:      #40c8f0;
      --green:     #50d890;
      --orange:    #f08840;
      --pink:      #d040a0;
      --red:       #e84040;
      --blue:      #6080f0;
      --purple:    #b070f0;
    }

    html, body { height: 100%; }
    body {
      font-family: 'Georgia', serif;
      background:
        radial-gradient(1100px 700px at 70% -10%, #14143200 0%, transparent 60%),
        var(--bg);
      color: var(--text);
      line-height: 1.8;
      min-height: 100vh;
      overflow-x: hidden;
      transition: filter 1.4s ease, background-color 1.4s ease;
    }

    /* faint starfield */
    #sky { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .star { position: absolute; border-radius: 50%; background: #d6e0f6; opacity: 0;
      animation: tw var(--dur) ease-in-out infinite; animation-delay: var(--delay); }
    @keyframes tw { 0%,100%{opacity:0;transform:scale(.6)} 50%{opacity:var(--max);transform:scale(1)} }

    /* nav */
    .top-left { position: fixed; top: 16px; left: 18px; z-index: 100; }
    .top-left a {
      color: var(--muted); text-decoration: none; font-style: italic; font-size: .95rem;
      transition: color .2s;
    }
    .top-left a:hover { color: var(--gold); }
    .lang-toggle {
      position: fixed; top: 16px; right: 16px; z-index: 100; display: flex; gap: 2px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 3px; font-family: 'Georgia', serif;
    }
    .lang-toggle a {
      padding: 6px 14px; border-radius: 6px; cursor: pointer; text-decoration: none;
      color: var(--text); font-size: .9rem; transition: color .2s, background .2s;
    }
    .lang-toggle a:hover { color: var(--gold); }
    .lang-toggle a.active { background: rgba(244,200,48,.15); color: var(--gold); }

    .wrap { position: relative; z-index: 1; max-width: 760px; margin: 0 auto;
      padding: 64px 24px 120px; text-align: center; }

    header h1 {
      font-size: 2.6rem; font-style: italic; color: var(--gold); letter-spacing: .03em;
      text-shadow: 0 0 50px rgba(244,200,48,.25);
    }
    header .tagline { margin-top: 12px; color: #6090c0; font-style: italic; font-size: 1.08rem; }
    header .thesis { margin-top: 16px; color: var(--gold); font-style: italic; font-size: .92rem; opacity: .85; }

    /* breathing figure */
    .stage { margin: 40px auto 8px; position: relative; width: min(78vw, 360px); aspect-ratio: 1; }
    svg.ring { width: 100%; height: 100%; display: block; overflow: visible; }
    .ring .bg-ring { fill: none; stroke: var(--border); stroke-width: 2; }
    .ring .arc { fill: none; stroke: var(--gold); stroke-width: 4; stroke-linecap: round;
      filter: drop-shadow(0 0 8px rgba(244,200,48,.4)); transition: stroke .8s ease; }
    .ring .dot { fill: #fff; filter: drop-shadow(0 0 6px rgba(255,255,255,.7)); }
    .ring .halo { fill: rgba(244,200,48,.05); }

    .center {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; pointer-events: none;
    }
    .center .num {
      font-size: clamp(3rem, 16vw, 5.6rem); font-style: italic; color: var(--text);
      line-height: 1; letter-spacing: .01em; transition: color .5s;
    }
    .center .breathe { margin-top: 14px; font-style: italic; color: var(--cyan);
      font-size: 1rem; letter-spacing: .12em; opacity: .9; min-height: 1.4em; transition: opacity .6s; }
    .turns { margin-top: 4px; color: var(--muted); font-size: .9rem; letter-spacing: .06em; }
    .turns .tau { color: var(--gold); font-style: italic; }

    /* primary button */
    .begin {
      margin-top: 26px; font-family: 'Georgia', serif; font-style: italic;
      font-size: 1.15rem; color: var(--gold); cursor: pointer;
      background: linear-gradient(180deg, rgba(244,200,48,.16), rgba(244,200,48,.05));
      border: 1px solid rgba(244,200,48,.5); border-radius: 999px; padding: 12px 40px;
      transition: all .3s; box-shadow: 0 0 30px -10px rgba(244,200,48,.4);
    }
    .begin:hover { background: rgba(244,200,48,.2); }

    /* controls */
    .controls { margin-top: 40px; display: flex; flex-wrap: wrap; gap: 14px 22px;
      justify-content: center; align-items: flex-end; }
    .field { display: flex; flex-direction: column; gap: 6px; font-family: monospace;
      font-size: .68rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
    select {
      font-family: 'Georgia', serif; font-size: .98rem; color: var(--text);
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 14px; cursor: pointer; transition: border-color .2s;
    }
    select:hover { border-color: rgba(244,200,48,.4); }
    input[type=range] { -webkit-appearance: none; appearance: none; width: 150px; height: 4px;
      border-radius: 999px; background: var(--border); outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px;
      border-radius: 50%; background: var(--gold); box-shadow: 0 0 8px rgba(244,200,48,.5); }
    input[type=range]::-moz-range-thumb { width: 15px; height: 15px; border: none;
      border-radius: 50%; background: var(--gold); }
    .pace-val { font-family: monospace; color: var(--text); font-size: .8rem; }

    .toggle-btn, .amb-btn {
      font-family: 'Georgia', serif; font-size: .9rem; color: var(--text);
      background: var(--surface); border: 1px solid var(--border); border-radius: 999px;
      padding: 8px 16px; cursor: pointer; transition: all .3s;
    }
    .toggle-btn:hover, .amb-btn:hover { border-color: rgba(244,200,48,.4); }
    .toggle-btn.on, .amb-btn.on {
      background: linear-gradient(180deg, rgba(244,200,48,.22), rgba(244,200,48,.08));
      border-color: rgba(244,200,48,.6); color: var(--gold);
    }

    .ambient-row { margin-top: 26px; display: flex; flex-wrap: wrap; gap: 9px;
      justify-content: center; align-items: center; }
    .ambient-row .lbl { font-family: monospace; font-size: .66rem; letter-spacing: .14em;
      text-transform: uppercase; color: var(--muted); margin-right: 2px; }
    #vol { width: 110px; }

    /* faint per-sequence insight */
    em.m { font-style: italic; color: var(--cyan); }  em.mx { font-style: italic; color: var(--red); }
    em.my { font-style: italic; color: var(--blue); } em.mt { font-style: italic; color: var(--purple); }
    em.mr { font-style: italic; color: var(--orange); } em.mtau { font-style: italic; color: var(--gold); }
    em.mg { font-style: italic; color: var(--green); } em.mp { font-style: italic; color: var(--pink); }
    .insight {
      margin: 4px auto 0; max-width: 480px; min-height: 1.6em;
      color: var(--muted); font-size: .92rem; font-style: italic; line-height: 1.6;
      opacity: 0; transition: opacity .7s ease;
    }
    .insight.show { opacity: .8; }

    /* mode switch (Counting / Story) */
    .mode-toggle { display: flex; gap: 8px; justify-content: center; margin: 6px 0 30px; }
    .mode-btn { font-family: 'Georgia', serif; font-style: italic; font-size: 1rem; color: var(--text);
      background: var(--surface); border: 1px solid var(--border); border-radius: 999px;
      padding: 9px 24px; cursor: pointer; transition: all .3s; }
    .mode-btn:hover { border-color: rgba(244,200,48,.4); }
    .mode-btn.on { background: linear-gradient(180deg, rgba(244,200,48,.2), rgba(244,200,48,.06));
      border-color: rgba(244,200,48,.6); color: var(--gold); }
    .controls.shared { margin-top: 30px; }

    /* story panel */
    @keyframes settle { to { opacity: 1; filter: blur(0); transform: none; } }
    .story-panel { text-align: left; max-width: 600px; margin: 4px auto 0;
      font-size: clamp(1.04rem, 2.6vw, 1.22rem); line-height: 2; min-height: 34vh; }
    .story-panel p { margin: 0 0 1.3rem; opacity: 0; filter: blur(6px); transform: translateY(8px);
      animation: settle 2.1s ease forwards; }
    .story-panel .stitle { text-align: center; color: var(--gold); font-style: italic;
      font-size: 1.12em; letter-spacing: .04em; margin-bottom: 1.8rem; }
    .story-panel em.num { color: var(--gold); font-style: italic; font-weight: 600;
      text-shadow: 0 0 14px rgba(244,200,48,.3); }
    .story-panel em.op { color: var(--cyan); font-style: normal; }
    .story-panel .placeholder { text-align: center; color: var(--muted); font-style: italic;
      opacity: .8; margin-top: 9vh; }

    .note { margin-top: 30px; color: var(--muted); font-size: .9rem; font-style: italic;
      line-height: 1.7; max-width: 560px; margin-left: auto; margin-right: auto; }

    footer { margin-top: 60px; padding-top: 28px; border-top: 1px solid var(--border);
      font-size: .85rem; color: var(--muted); line-height: 1.7; }
    footer a { color: var(--cyan); text-decoration: none; border-bottom: 1px dotted rgba(64,200,240,.5); }
    footer a:hover { color: var(--gold); border-bottom-color: var(--gold); }

    /* dim-to-sleep */
    body.dim { filter: brightness(.4) saturate(.8); }
    body.asleep { filter: brightness(.06); }

    @media (max-width: 520px) {
      .wrap { padding: 54px 18px 120px; }
      header h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
<div id="sky"></div>

<div class="top-left"><a href="/">← MathTau</a></div>
<div class="lang-toggle">
  <a data-lang="en" class="active">English</a>
  <a data-lang="zh">中文</a>
</div>

<div class="wrap">
  <header>
    <h1 data-i18n="title">The τ Lullaby</h1>

  <section id="mode-count" hidden>
    <div class="stage">

    <div class="controls">

  <section id="mode-story">

    <div class="controls">
      <label class="field"><span data-i18n="heroLabel">Who</span>

  <div class="controls shared">

    <button class="toggle-btn on" id="narrate" data-i18n="narrate">read aloud</button>

  <div class="ambient-row">
    <span class="lbl" data-i18n="ambient">ambient</span>
    <button class="amb-btn" data-sound="rain"  data-i18n="rain">rain</button>
    <button class="amb-btn" data-sound="waves" data-i18n="waves">waves</button>
    <button class="amb-btn" data-sound="wind"  data-i18n="wind">wind</button>
    <button class="amb-btn" data-sound="fire"  data-i18n="fire">fire</button>
    <button class="amb-btn" data-sound="night" data-i18n="night">crickets</button>
    <input id="vol" type="range" min="0" max="1" step="0.01" value="0.55" title="volume">

  <p class="note" id="note"></p>

  <footer>
    <p>Part of <a href="/">MathTau</a> — mathematical explainers, derived naturally.

  </footer>

<script>
/* ============================================================
   The τ Lullaby — a MathTau page.
   A breathing circle that counts you to sleep. Fully offline.
   One breath = one step around the circle. One full turn = τ.
   Ambient sound is synthesized live with Web Audio (no files).
   ============================================================ */

/* ---------------- i18n ---------------- */
const I18N = {
  en: {
    title: "The τ Lullaby",
    tagline: "count yourself to sleep, one full turn at a time",
    thesis: 'every breath draws one step around the circle — every full turn is one <em>τ</em>',
    begin: "Begin", pause: "Pause",
    seqLabel: "Count", paceLabel: "Breaths / min", timerLabel: "Sleep timer",
    narrate: "read aloud", dim: "dim", why: "why",
    modeCount: "Counting", modeStory: "A story",
    heroLabel: "Who", lenLabel: "Length", newStory: "Tell me a story", anotherStory: "Another story",
    autoStory: "keep going", pauseStory: "pause", resumeStory: "resume",
    lenShort: "short", lenMed: "medium", lenLong: "long", lenAny: "🎲 surprise me", anyHero: "✨ anyone",
    storyHint: "Pick who it’s about, and let a small, sleepy story count itself out.",
    ambient: "ambient", rain: "rain", waves: "waves", wind: "wind", fire: "fire", night: "crickets",
    in: "breathe in", out: "breathe out",
    turns: (n) => `${n} full ${n===1?'turn':'turns'} · ${n}τ`,
    note: "Pick a way to count, set a slow pace, and let the numbers go on without you. " +
          "The circle fills as you breathe; each time it closes is one τ. " +
          "When the sleep timer runs out, the screen and sound fade away on their own.",
    seqs: {
      sheep:    "counting sheep · 1, 2, 3 …",
      doubling: "doubling · 1, 2, 4, 8 …",
      triangle: "running sums · 1, 3, 6, 10 …",
      fib:      "Fibonacci · 1, 1, 2, 3, 5 …",
      down3:    "counting down · 100, 97, 94 …",
      down7:    "counting down by 7 · 100, 93, 86 …",
      squares:  "square numbers · 1, 4, 9, 16 …",
    },
    whys: {
      sheep:    'every number is just <em class="m">1</em> added to the one before it.',
      doubling: 'each step is twice the last, so step <em class="m">k</em> is <em class="m">2</em> raised to <em class="m">k</em>.',
      triangle: 'these are <em class="m">1</em>+<em class="m">2</em>+…+<em class="m">n</em>. two such stacks form a rectangle, so the sum is ½·<em class="m">n</em>·(<em class="m">n</em>+1).',
      fib:      'each one is the sum of the two before it. their ratios drift toward the golden ratio <em class="mtau">φ</em>.',
      down3:    'subtracting a fixed step is an arithmetic sequence: a straight line, walked downhill.',
      down7:    'still a straight line down, just a wider step. it lands on the same place every 7 counts.',
      squares:  'the gaps between square numbers are the odd numbers: <em class="mg">1, 3, 5, 7</em> …',
    },
  },
  zh: {
    title: "τ 摇篮曲",
    tagline: "一圈一圈，数着数着就睡着了",
    thesis: '每一次呼吸，画出圆上的一步 —— 每画满一整圈，就是一个 <em>τ</em>',
    begin: "开始", pause: "暂停",
    seqLabel: "数法", paceLabel: "每分钟呼吸", timerLabel: "睡眠定时",
    narrate: "朗读", dim: "调暗", why: "原理",
    modeCount: "数数", modeStory: "讲故事",
    heroLabel: "主角", lenLabel: "长短", newStory: "讲一个故事", anotherStory: "再讲一个",
    autoStory: "连续播放", pauseStory: "暂停", resumeStory: "继续",
    lenShort: "短", lenMed: "中", lenLong: "长", lenAny: "🎲 随机", anyHero: "✨ 随便谁",
    storyHint: "选一个主角，让一个小小的、困困的故事，自己数着数着就讲完了。",
    ambient: "环境音", rain: "雨声", waves: "海浪", wind: "风声", fire: "炉火", night: "虫鸣",
    in: "吸 气", out: "呼 气",
    turns: (n) => `已画 ${n} 整圈 · ${n}τ`,
    note: "选一种数法，把节奏调慢，让数字自己一个一个走下去。" +
          "圆圈会随着呼吸一点点画满，每画满一整圈，就是一个 τ。" +
          "睡眠定时一到，画面和声音都会自己慢慢消失。",
    seqs: {
      sheep:    "数羊 · 1、2、3 ……",
      doubling: "翻倍 · 1、2、4、8 ……",
      triangle: "累加 · 1、3、6、10 ……",
      fib:      "斐波那契 · 1、1、2、3、5 ……",
      down3:    "倒数 · 100、97、94 ……",
      down7:    "每次减 7 · 100、93、86 ……",
      squares:  "平方数 · 1、4、9、16 ……",
    },
    whys: {
      sheep:    '每一个数，不过是前一个数再加上 <em class="m">1</em>。',
      doubling: '每一步都是上一步的两倍，所以第 <em class="m">k</em> 步是 <em class="m">2</em> 的 <em class="m">k</em> 次方。',
      triangle: '它们是 <em class="m">1</em>+<em class="m">2</em>+…+<em class="m">n</em>。两摞这样的台阶拼成一个长方形，所以和是 ½·<em class="m">n</em>·(<em class="m">n</em>+1)。',
      fib:      '每个数都是前两个之和，它们的比值越来越接近黄金比例 <em class="mtau">φ</em>。',
      down3:    '每次减去相同的一步，这是等差数列：一条直线，往下走。',
      down7:    '同样是一条往下的直线，只是步子更大，每 7 步落回同一个位置。',
      squares:  '相邻平方数之间的间隔，正是奇数：<em class="mg">1、3、5、7</em> ……',
    },
  },
};
let lang = "en";

/* ---------------- 数列(简单的) ---------------- */
/* 每个: start() 初值; next(state) 下一个; cap 重置上限 */
const SEQS = {
  sheep:    { start: () => 1,            next: v => v + 1,             reset: v => v > 999 ? 1 : v },
  doubling: { start: () => 1,            next: v => v * 2,             reset: v => v > 1024 ? 1 : v },
  triangle: { start: () => ({ n:1, s:1 }), nextO: st => ({ n: st.n+1, s: st.s + st.n+1 }),
              val: st => st.s, resetO: st => st.s > 990 ? { n:1, s:1 } : st },
  fib:      { start: () => ({ a:1, b:1, show:1 }), nextO: st => ({ a: st.b, b: st.a+st.b, show: st.b }),
              val: st => st.show, resetO: st => st.b > 987 ? { a:1, b:1, show:1 } : st },
  down3:    { start: () => 99,           next: v => v - 3,             reset: v => v < 0 ? 99 : v },
  down7:    { start: () => 98,           next: v => v - 7,             reset: v => v < 0 ? 98 : v },
  squares:  { start: () => ({ n:1 }), nextO: st => ({ n: st.n+1 }),
              val: st => st.n * st.n, resetO: st => st.n*st.n > 900 ? { n:1 } : st },
};
const SEQ_ORDER = ["sheep","doubling","triangle","fib","down3","down7","squares"];

/* ---------------- 几何(连续绕圈的彗尾 + 呼吸缩放) ---------------- */
const R = 120, C = 2 * Math.PI * R;
const TRAIL = 0.55, A = C * TRAIL;              // 彗尾长度(占整圈的比例)
const arcEl = document.getElementById("arc");
const dotEl = document.getElementById("dot");
const figEl = document.getElementById("figure");
const numEl = document.getElementById("num");
const breatheEl = document.getElementById("breathe");
const turnsEl = document.getElementById("turns");
arcEl.style.strokeDasharray = `${A} ${C}`;      // 只露出一段弧,其余隐去

const TURN_COLORS = ["var(--gold)","var(--cyan)","var(--green)","var(--purple)","var(--pink)","var(--orange)"];
// f = 当前这一次呼吸内绕圈的进度(0→1),彗头即光点位置
function setComet(f) { arcEl.style.strokeDashoffset = A - f * C; }
function setDot(f) {
  const th = -Math.PI/2 + f * 2*Math.PI;
  dotEl.setAttribute("cx", 150 + R*Math.cos(th));
  dotEl.setAttribute("cy", 150 + R*Math.sin(th));
}
function setScale(s) { figEl.setAttribute("transform", `translate(150 150) scale(${s}) translate(-150 -150)`); }
const easeInOut = u => u < .5 ? 2*u*u : 1 - Math.pow(-2*u+2, 2)/2;

/* ---------------- 状态 & 循环 ---------------- */
let running = false, raf = null, cycleStart = 0;
let seqKey = "sheep", state = null, displayVal = 1;
let turns = 0;
let pace = 6;                  // 每分钟呼吸数
const INHALE = 0.4;           // 吸气占比(呼气更长,更放松)

function curVal() {
  const s = SEQS[seqKey];
  return s.val ? s.val(state) : state;
}
function initSeq() {
  const s = SEQS[seqKey];
  state = s.start();
  displayVal = curVal();
}
function advance() {
  const s = SEQS[seqKey];
  if (s.nextO) { state = s.resetO(s.nextO(state)); }
  else { state = s.reset(s.next(state)); }
  displayVal = curVal();
  turns++;                                        // 每一次呼吸 = 绕一整圈 = 一个 τ
  arcEl.style.stroke = TURN_COLORS[turns % TURN_COLORS.length];
  if (turns % 10 === 0) chime();                  // 每 10 圈,一声极轻的提示
  numEl.textContent = displayVal;
  turnsEl.innerHTML = I18N[lang].turns(turns);
  if (narrateOn) speak(displayVal);
}

function loop(ts) {
  if (!running) return;
  if (!cycleStart) cycleStart = ts;
  const cycleMs = 60000 / pace;
  let t = (ts - cycleStart) / cycleMs;
  if (t >= 1) { cycleStart = ts; t = 0; advance(); }

  // 呼吸缩放 + 提示
  let scale;
  if (t < INHALE) { scale = 0.82 + 0.18 * easeInOut(t / INHALE); setBreath(true); }
  else { scale = 1.0 - 0.18 * easeInOut((t - INHALE) / (1 - INHALE)); setBreath(false); }
  setScale(scale);

  // 连续绕圈:每一次呼吸,光点带着彗尾绕整圈一周(始终在动)
  setComet(t); setDot(t);

  raf = requestAnimationFrame(loop);
}
let lastBreathIn = null;
function setBreath(inhale) {
  if (lastBreathIn === inhale) return;
  lastBreathIn = inhale;
  breatheEl.textContent = inhale ? I18N[lang].in : I18N[lang].out;
}

function start() {
  if (running) { pause(); return; }
  running = true; cycleStart = 0; lastBreathIn = null;
  initSeq();
  numEl.textContent = displayVal;
  if (narrateOn) speak(displayVal);
  Ambient.prime();
  beginBtn.textContent = I18N[lang].pause;
  document.body.classList.remove("asleep");
  startTimer();
  raf = requestAnimationFrame(loop);
}
function pause() {
  running = false; if (raf) cancelAnimationFrame(raf);
  stopVoice(); clearTimer(); clearAuto();
  beginBtn.textContent = I18N[lang].begin;
  breatheEl.textContent = "";
}

/* ---------------- 朗读 ---------------- */
let narrateOn = true;
let storyAuto = true, storyToken = 0, autoTimer = null, chainArmed = false;
let advancing = false, storyPaused = false, speechKeep = null;
const GAP = 3000;   // 两三秒的间歇,再开始下一篇
const IS_SAFARI = /^((?!chrome|android|crios|fxios).)*safari/i.test(navigator.userAgent);
function clearAuto() { if (autoTimer) { clearTimeout(autoTimer); clearInterval(autoTimer); autoTimer = null; } }
function pickVoice() {
  const vs = speechSynthesis.getVoices();
  return lang === "zh"
    ? vs.find(x => /zh|chinese|tingting|xiaoxiao|huihui/i.test(x.name + x.lang))
    : (vs.find(x => /samantha|aria|jenny|zira|female/i.test(x.name)) || vs.find(x => /en/i.test(x.lang)));
}
function speak(v) {                          // 朗读单个数字(数数模式)
  if (!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(String(v));
  u.lang = lang === "zh" ? "zh-CN" : "en-US";
  u.rate = 0.8; u.pitch = 0.95; u.volume = 0.9;
  const want = pickVoice(); if (want) u.voice = want;
  speechSynthesis.speak(u);
}
function stripTags(html) { const d = document.createElement("div"); d.innerHTML = html; return d.textContent || ""; }
function speakStory(paras) {                    // 缓缓朗读整篇故事(故事模式)
  if (!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  if (speechKeep) { clearInterval(speechKeep); speechKeep = null; }
  // 整篇只用一个 utterance —— iOS 会把多段排队的语音叠在一起,造成破音
  const sep = lang === "zh" ? "。  " : ".  ";
  const text = paras.map(p => stripTags(p.html)).join(sep);
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang === "zh" ? "zh-CN" : "en-US";
  u.rate = 0.9; u.pitch = 1.0; u.volume = 1.0;     // 不改音高,避免 iOS 失真
  const want = pickVoice(); if (want) u.voice = want;
  speechSynthesis.speak(u);
  // Chrome 会在 ~15 秒后悄悄掐断长朗读;定时 resume 让它把整篇读完(Safari 不需要)
  if (!IS_SAFARI) {
    speechKeep = setInterval(() => {
      if (storyPaused) return;                       // 用户手动暂停时,不要去 resume
      if (speechSynthesis.speaking) { speechSynthesis.pause(); speechSynthesis.resume(); }
      else { clearInterval(speechKeep); speechKeep = null; }
    }, 10000);
  }
}
function stopVoice() {
  chainArmed = false;
  if (speechKeep) { clearInterval(speechKeep); speechKeep = null; }
  if ("speechSynthesis" in window) speechSynthesis.cancel();
}
if ("speechSynthesis" in window) speechSynthesis.onvoiceschanged = () => {};

  fox:      { emoji:"🦊", en:{k:"fox cub",  n:["Ember","Ginger","Rufus"]},              zh:{k:"狐狸", n:["小橙","火火","橘子"]} },
  mouse:    { emoji:"🐭", en:{k:"mouse",    n:["Squeak","Crumb","Pip"]},                zh:{k:"老鼠", n:["吱吱","米粒","点点"]} },
};
const HERO_ORDER = ["any","cat","dog","rabbit","squirrel","duck","bear","fox","mouse"];

function heroS(key) {
  const a = SANIMALS[key][lang], name = SR.pick(a.n);
  return { key, k: a.k, name, full: lang === "en" ? `a little ${a.k} named ${name}` : `小${a.k}${name}` };
}
function friendS(exclude) {
  const ks = Object.keys(SANIMALS).filter(k => !exclude.includes(k));
  return heroS(SR.pick(ks));
}

/* --- 故事(每篇都藏着一点算术) --- */

  const f = friendS([h.key]);
  const have = L ? (a+b+d-g) : (M ? a+b+d : a+b), left = have - c, P = [];
  if (lang === "en") {
    P.push({cls:"stitle", html:"Counting Berries"});
    P.push({html:`In a warm hollow at the edge of the woods lived ${h.full}.`});
    if (M) P.push({html:`It had been a long, golden afternoon, and the shadows were growing soft and long.`});
    P.push({html:`One quiet evening, ${h.name} took a small basket out to pick berries.`});
    if (L) P.push({html:`The path was cool underfoot, and the woods were settling down for the night, leaf by leaf.`});
    P.push({html:`Under the first bush were ${num(a)} berries, round and shiny.`});
    P.push({html:`Under the next, ${h.name} found ${num(b)} more.`});
    P.push({html:`${num(a)} and ${num(b)}… ${h.name} counted them slowly. That makes ${num(a+b)}.`});
    if (M) P.push({html:`Further along, behind a mossy log, were ${num(d)} more — the darkest, sweetest ones of all.`});
    if (M) P.push({html:`${num(a+b)} and ${num(d)} more… now there were ${num(a+b+d)} berries nestled in the basket.`});
    if (L) P.push({html:`${h.name} sat a while and listened: a stream somewhere, a sleepy bird, the slow hush of the leaves.`});
    if (L) P.push({html:`On the way home, ${h.name} met ${f.full}, who hadn’t found a single berry all day.`});
    if (L) P.push({html:`“Here, have some.” ${h.name} gave ${f.name} ${num(g)}. ${num(a+b+d)} take away ${num(g)} leaves ${num(a+b+d-g)}.`});
    if (L) P.push({html:`${f.name} smiled so wide that ${h.name} felt warm the whole way home.`});
    P.push({html:`At home, ${h.name} ate just ${num(c)} before bed. ${num(have)} take away ${num(c)} leaves ${num(left)}.`});
    if (L) P.push({html:`${num(left)} berries, lined up on a leaf, saved for the morning, glistening in the last of the light.`});

  } else {
    P.push({cls:"stitle", html:"数浆果"});
    P.push({html:`森林边一个暖暖的小树洞里，住着${h.full}。`});
    if (M) P.push({html:`这是一个又长又金黄的下午，影子被拉得软软的、长长的。`});
    P.push({html:`一个安静的傍晚，${h.name}挎上小篮子，出门去采浆果。`});
    if (L) P.push({html:`小路踩上去凉凉的，森林正一片叶子、一片叶子地，慢慢安静下来。`});
    P.push({html:`第一丛灌木下，有 ${num(a)} 颗浆果，又圆又亮。`});
    P.push({html:`第二丛下面，${h.name}又找到了 ${num(b)} 颗。`});
    P.push({html:`${num(a)} 颗，再加 ${num(b)} 颗……${h.name}慢慢地数，一共是 ${num(a+b)} 颗。`});
    if (M) P.push({html:`再往前，一根长满青苔的倒木后面，还藏着 ${num(d)} 颗——是最黑最甜的那种。`});
    if (M) P.push({html:`${num(a+b)} 颗，再添上 ${num(d)} 颗……篮子里现在有 ${num(a+b+d)} 颗啦。`});
    if (L) P.push({html:`${h.name}坐下来听了一会儿：不知哪里的小溪，一只困倦的鸟，还有树叶缓缓的沙沙声。`});
    if (L) P.push({html:`回家路上，${h.name}遇到了${f.full}，它今天一颗浆果也没找到。`});
    if (L) P.push({html:`“给你一些吧。”${h.name}分给${f.name} ${num(g)} 颗。${num(a+b+d)} 减去 ${num(g)}，还剩 ${num(a+b+d-g)} 颗。`});

    P.push({cls:"stitle", html:"Sharing, Just Right"});

    P.push({html:`That afternoon, ${h.name} had baked ${num(tot)} warm biscuits.`});
    P.push({html:`Soon there came a soft knock at the door. Friends had come to visit.`});
    P.push({html:`Counting ${h.name}, there were ${num(sharers)} of them in all.`});

    P.push({html:`……每份正好 ${num(each)} 块。因为 ${num(sharers)} 乘 ${num(each)} 就是 ${num(tot)}，不多，不少。`});
    if (L) P.push({html:`接着，${h.name}又想起还有一碗 ${num(fruitTot)} 颗熟透的浆果。`});
    if (L) P.push({html:`${num(fruitTot)} 颗浆果，照样分给 ${num(sharers)} 个小家伙，每人正好 ${num(fruitEach)} 颗。`});

function arcSteps(h, lvl) {                     // 倒数(回家的台阶)

    P.push({cls:"stitle", html:"会翻倍的花园"});

    if (L) P.push({html:`一夜之间，${num(seq[days-2])} 朵变成了 ${num(last)} 朵——真不敢相信，小小的东西，竟长得这么快。`});

/* ----- halving ----- */
function arcHalf(h, lvl) {

    P.push({html:`One half ${h.name} set aside; the other broke again — half of ${num(start/2)} is ${num(start/4)}.`});
    P.push({html:`And half of ${num(start/4)} is ${num(start/8)}.`});
    if (L) P.push({html:`And at last, half of ${num(start/8)} is ${num(start/16)} — one tiny final crumb.`});
    if (M) P.push({html:`Each piece was half the size of the one before: ${seq.map(num).join(", ")}.`});
    if (L) P.push({html:`The crumbs grew so small, and the room so very quiet.`});
    P.push({html:`By that last little half, ${h.name} was far too sleepy to chew, and drifted off, sweet and warm.`});
  } else {
    P.push({cls:"stitle",html:"一半，再一半"});

    P.push({html:`${num(start/4)} 的一半，是 ${num(start/8)}。`});
    if (L) P.push({html:`最后，${num(start/8)} 的一半，是 ${num(start/16)}——剩下小小的一点点。`});

    P.push({html:`到了最后那小小的一半，${h.name}已经困得嚼不动了，甜甜暖暖地睡着了。`});
  }
  return P;
}

/* ----- odd / even, pairs ----- */

// 洗牌发牌:每轮把所有故事各发一次,发完再洗;且不连着重复同一篇
function bagDealer(items) {
  let bag = [], last = null;
  return () => {
    if (bag.length === 0) {
      bag = items.slice();
      for (let i = bag.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [bag[i], bag[j]] = [bag[j], bag[i]]; }
      if (bag.length > 1 && bag[bag.length - 1] === last) [bag[0], bag[bag.length - 1]] = [bag[bag.length - 1], bag[0]];
    }
    return (last = bag.pop());
  };
}
const nextArc = bagDealer(STORY_ARCS);
const nextHero = bagDealer(Object.keys(SANIMALS));

};

// 朗读“当前这一篇”并接上自动续播(不新建故事) —— 暂停后继续就用它
function playCurrent() {
  clearAuto(); advancing = false;
  storyToken++; const myToken = storyToken;
  document.body.classList.remove("asleep");
  Ambient.prime();

  const ok = () => storyAuto && !storyPaused && mode === "story" &&
                   myToken === storyToken && !document.body.classList.contains("asleep");
  const advance = () => {                        // 一篇读完 → 歇几秒 → 下一篇
    if (advancing || !ok()) return;
    advancing = true; clearAuto();
    autoTimer = setTimeout(() => { if (ok()) newStory(); }, GAP);
  };

  if (narrateOn && ("speechSynthesis" in window)) {
    chainArmed = true;
    speakStory(currentStory);
    let started = false;                         // 轮询朗读是否真的读完(比 onend 可靠)
    autoTimer = setInterval(() => {
      if (!chainArmed) { clearAuto(); return; }
      if (speechSynthesis.speaking || speechSynthesis.pending) { started = true; return; }
      if (started) { clearAuto(); advance(); }
    }, 700);
  } else {
    const chars = currentStory.reduce((n, p) => n + stripTags(p.html).length, 0);
    const silent = Math.max(22, lang === "zh" ? chars / 7 : chars / 16);   // 默读留出的时间
    autoTimer = setTimeout(advance, silent * 1000);
  }
  startTimer();
}

// 新建一篇(主角与长短按选择随机轮换),再播放
function newStory() {
  if (storyPaused) { storyPaused = false; setPauseBtn(false); }   // 手动开始 = 取消暂停
  currentStory = Story.build(document.getElementById("hero").value, document.getElementById("slen").value);
  renderStory(currentStory);
  document.getElementById("newStory").textContent = I18N[lang].anotherStory;

}

function setPauseBtn(p) {
  const btn = document.getElementById("pauseStory");
  btn.classList.toggle("on", p);
  btn.textContent = p ? I18N[lang].resumeStory : I18N[lang].pauseStory;
}
function toggleStoryPause() {
  const speaking = narrateOn && ("speechSynthesis" in window);
  if (storyPaused) {                             // 继续:从暂停处接着往下读(不重头、不跳下一篇)
    storyPaused = false; setPauseBtn(false);
    if (speaking) speechSynthesis.resume();      // 朗读:就地继续(轮询仍在跑,读完会自动续播)
    else if (currentStory.length) playCurrent(); // 默读:重新计时(同一篇,不重排文字)
  } else {                                       // 暂停:就地停住
    storyPaused = true; setPauseBtn(true);
    if (speaking) speechSynthesis.pause();       // 朗读:在当前这句就地暂停
    else clearAuto();                            // 默读:停掉前进计时
  }
}

/* ============================================================
   环境音 —— Web Audio 实时合成(雨 / 浪 / 风 / 火 / 虫鸣)+ 轻提示音
   ============================================================ */
const Ambient = (() => {
  let ctx = null, master = null, noiseBuf = null, unlockEl = null;
  const layers = {};
  // iOS: 一段静音媒体在用户手势里播放,可把音频会话切到“playback”,
  // 这样 Web Audio 即使在「静音/响铃」拨片打开时也能发声。
  function unlockIOS() {
    if (unlockEl) return;
    try {
      unlockEl = new Audio("data:audio/wav;base64,UklGRiwAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQgAAAAAAAAAAAAAAA==");
      unlockEl.loop = true; unlockEl.setAttribute("playsinline", ""); unlockEl.volume = 1;
      unlockEl.play().catch(() => {});
    } catch (e) {}
  }
  function ensure() {
    unlockIOS();
    if (!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      master = ctx.createGain();
      master.gain.value = parseFloat(document.getElementById("vol").value);
      const limiter = ctx.createDynamicsCompressor();   // 防削波,声音更干净
      limiter.threshold.value = -3; limiter.ratio.value = 12;
      limiter.attack.value = 0.003; limiter.release.value = 0.25;
      master.connect(limiter); limiter.connect(ctx.destination);
      const len = ctx.sampleRate * 4;
      noiseBuf = ctx.createBuffer(1, len, ctx.sampleRate);
      const d = noiseBuf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    }
    if (ctx.state === "suspended") ctx.resume();
  }
  function noise() { const s = ctx.createBufferSource(); s.buffer = noiseBuf; s.loop = true; s.start(); return s; }
  function teardown(l) {
    if (l.timer) clearInterval(l.timer);
    (l.srcs || []).forEach(s => { try { s.stop(); } catch (e) {} });
    (l.nodes || []).forEach(n => { try { n.disconnect(); } catch (e) {} });
  }
  const BUILDERS = {
    rain() {
      const src = noise();
      const hp = ctx.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=500;
      const lp = ctx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=7000;
      const out = ctx.createGain(); out.gain.value=0;
      src.connect(hp); hp.connect(lp); lp.connect(out); out.connect(master);
      return { out, target:0.5, srcs:[src], nodes:[hp,lp,out] };
    },
    waves() {
      const src = noise();
      const lp = ctx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=550;
      const swell = ctx.createGain(); swell.gain.value=0.4;
      const out = ctx.createGain(); out.gain.value=0;
      src.connect(lp); lp.connect(swell); swell.connect(out); out.connect(master);
      const lfo = ctx.createOscillator(); lfo.frequency.value=0.11;
      const lg = ctx.createGain(); lg.gain.value=0.34;
      lfo.connect(lg); lg.connect(swell.gain); lfo.start();
      return { out, target:0.6, srcs:[src], nodes:[lp,swell,out,lg], _osc:lfo };
    },
    wind() {
      const src = noise();
      const bp = ctx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=500; bp.Q.value=0.6;
      const out = ctx.createGain(); out.gain.value=0;
      src.connect(bp); bp.connect(out); out.connect(master);
      const lfo = ctx.createOscillator(); lfo.frequency.value=0.07;
      const lg = ctx.createGain(); lg.gain.value=320;
      lfo.connect(lg); lg.connect(bp.frequency); lfo.start();
      return { out, target:0.45, srcs:[src], nodes:[bp,out,lg], _osc:lfo };
    },
    fire() {
      const src = noise();
      const lp = ctx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=900;
      const base = ctx.createGain(); base.gain.value=0.5;
      const out = ctx.createGain(); out.gain.value=0;
      src.connect(lp); lp.connect(base); base.connect(out); out.connect(master);
      const csrc = noise();
      const cbp = ctx.createBiquadFilter(); cbp.type="bandpass"; cbp.frequency.value=1700; cbp.Q.value=1.2;
      const cg = ctx.createGain(); cg.gain.value=0;
      csrc.connect(cbp); cbp.connect(cg); cg.connect(out);
      const timer = setInterval(() => {
        const t=ctx.currentTime, amp=0.2+Math.random()*0.6;
        cg.gain.cancelScheduledValues(t); cg.gain.setValueAtTime(cg.gain.value,t);
        cg.gain.linearRampToValueAtTime(amp,t+0.004);
        cg.gain.linearRampToValueAtTime(0,t+0.04+Math.random()*0.07);
      }, 70+Math.random()*130);
      return { out, target:0.55, srcs:[src,csrc], nodes:[lp,base,cbp,cg,out], timer };
    },
    night() {
      const src = noise();
      const bp = ctx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=4500; bp.Q.value=8;
      const trem = ctx.createGain(); trem.gain.value=0.5;
      const out = ctx.createGain(); out.gain.value=0;
      src.connect(bp); bp.connect(trem); trem.connect(out); out.connect(master);
      const lfo = ctx.createOscillator(); lfo.type="square"; lfo.frequency.value=11;
      const lg = ctx.createGain(); lg.gain.value=0.45;
      lfo.connect(lg); lg.connect(trem.gain); lfo.start();
      const src2 = noise();
      const lp2 = ctx.createBiquadFilter(); lp2.type="lowpass"; lp2.frequency.value=400;
      const g2 = ctx.createGain(); g2.gain.value=0.15;
      src2.connect(lp2); lp2.connect(g2); g2.connect(out);
      return { out, target:0.3, srcs:[src,src2], nodes:[bp,trem,out,lg,lp2,g2], _osc:lfo };
    },
  };
  function toggle(name, btn) {
    ensure();
    if (layers[name]) { stopLayer(name); btn.classList.remove("on"); }
    else {
      const l = BUILDERS[name](); const t = ctx.currentTime;
      l.out.gain.setValueAtTime(0, t);
      l.out.gain.linearRampToValueAtTime(l.target, t + 1.2);
      layers[name] = l; btn.classList.add("on");
    }
  }
  function stopLayer(name) {
    const l = layers[name]; if (!l) return; delete layers[name];
    const t = ctx.currentTime;
    try { l.out.gain.cancelScheduledValues(t); l.out.gain.setValueAtTime(l.out.gain.value, t);
          l.out.gain.linearRampToValueAtTime(0, t + 0.7); } catch (e) {}
    setTimeout(() => teardown(l), 850);
  }
  function setVolume(v) { if (master) master.gain.value = v; }
  function prime() { ensure(); }
  function chime() {
    if (!ctx) return;
    const t = ctx.currentTime;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = "sine"; o.frequency.value = 528;          // 柔和的提示音
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.12, t + 0.04);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 2.4);
    o.connect(g); g.connect(master); o.start(t); o.stop(t + 2.5);
  }
  function fadeOutAll(sec) {
    if (master) { const t = ctx.currentTime; master.gain.cancelScheduledValues(t);
      master.gain.setValueAtTime(master.gain.value, t);
      master.gain.linearRampToValueAtTime(0, t + sec); }
  }
  return { toggle, setVolume, prime, chime, fadeOutAll };
})();
function chime() { Ambient.chime(); }

/* ============================================================
   UI 绑定 & 语言
   ============================================================ */
const beginBtn = document.getElementById("begin");
const seqSel = document.getElementById("seq");
const insightEl = document.getElementById("insight");

let whyOn = false;
function updateInsight() {
  insightEl.innerHTML = I18N[lang].whys[seqKey] || "";
  insightEl.classList.toggle("show", whyOn);
}

function buildSeqOptions() {
  seqSel.innerHTML = "";
  SEQ_ORDER.forEach(k => {
    const o = document.createElement("option");
    o.value = k; o.textContent = I18N[lang].seqs[k];
    seqSel.appendChild(o);
  });
  seqSel.value = seqKey;
}
function applyLang(l) {
  lang = l;
  document.documentElement.lang = (l === "zh" ? "zh-CN" : "en");
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (key === "begin") { el.textContent = running ? I18N[l].pause : I18N[l].begin; return; }
    if (I18N[l][key] !== undefined) el.innerHTML = I18N[l][key];
  });
  document.getElementById("note").textContent = I18N[l].note;
  document.querySelectorAll(".lang-toggle a").forEach(a =>
    a.classList.toggle("active", a.dataset.lang === l));
  buildSeqOptions();
  buildHeroOptions(); buildLenOptions();
  document.getElementById("newStory").textContent = currentStory.length ? I18N[l].anotherStory : I18N[l].newStory;
  setPauseBtn(storyPaused);
  if (turns > 0) turnsEl.innerHTML = I18N[l].turns(turns);
  if (running) breatheEl.textContent = lastBreathIn ? I18N[l].in : I18N[l].out;
  updateInsight();
  if (mode === "story" && currentStory.length && !storyPaused) newStory();   // 切换语言时,用新语言重讲
  else storyPlaceholder();
}

document.querySelectorAll(".lang-toggle a").forEach(a =>
  a.addEventListener("click", () => applyLang(a.dataset.lang)));

beginBtn.addEventListener("click", start);
seqSel.addEventListener("change", () => {
  seqKey = seqSel.value; turns = 0;
  arcEl.style.stroke = TURN_COLORS[0]; setComet(0); setDot(0);
  turnsEl.innerHTML = "";
  initSeq(); numEl.textContent = displayVal;
  cycleStart = 0;
  updateInsight();
});
document.getElementById("pace").addEventListener("input", e => {
  pace = parseInt(e.target.value, 10);
  document.getElementById("paceVal").textContent = pace;
});
document.getElementById("timer").addEventListener("change", () => { if (running || (mode === "story" && currentStory.length)) startTimer(); });
document.getElementById("narrate").addEventListener("click", e => {
  narrateOn = !narrateOn; e.target.classList.toggle("on", narrateOn);
  if (!narrateOn) { stopVoice(); clearAuto(); }
  else if (mode === "story" && currentStory.length) newStory();
});
document.getElementById("autoStory").addEventListener("click", e => {
  storyAuto = !storyAuto; e.target.classList.toggle("on", storyAuto);
  if (!storyAuto) clearAuto();
});
document.getElementById("pauseStory").addEventListener("click", toggleStoryPause);
document.getElementById("m-count").addEventListener("click", () => setMode("count"));
document.getElementById("m-story").addEventListener("click", () => setMode("story"));
document.getElementById("newStory").addEventListener("click", newStory);
document.getElementById("hero").addEventListener("change", newStory);
document.getElementById("slen").addEventListener("change", () => { if (mode === "story") newStory(); });
document.getElementById("why").addEventListener("click", e => {
  whyOn = !whyOn; e.target.classList.toggle("on", whyOn);
  updateInsight();
});
document.getElementById("dim").addEventListener("click", e => {
  document.body.classList.toggle("dim"); e.target.classList.toggle("on");
});
document.querySelectorAll(".amb-btn").forEach(btn =>
  btn.addEventListener("click", () => Ambient.toggle(btn.dataset.sound, btn)));
document.getElementById("vol").addEventListener("input", e => Ambient.setVolume(parseFloat(e.target.value)));

/* 星空 */
(function makeStars() {
  const sky = document.getElementById("sky");
  for (let i = 0; i < 80; i++) {
    const s = document.createElement("div"); s.className = "star";
    s.style.left = Math.random()*100 + "%"; s.style.top = Math.random()*100 + "%";
    s.style.setProperty("--dur", (4 + Math.random()*7) + "s");
    s.style.setProperty("--delay", (Math.random()*8) + "s");
    s.style.setProperty("--max", (0.25 + Math.random()*0.5).toFixed(2));
    const z = (1 + Math.random()*2).toFixed(1);
    s.style.width = z+"px"; s.style.height = z+"px";
    sky.appendChild(s);
  }
})();

/* init */
initSeq();
applyLang("en");
setComet(0); setDot(0);
numEl.textContent = "·";
